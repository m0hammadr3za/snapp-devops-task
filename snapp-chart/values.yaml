replicaCount: 2

image:
  repository: registry.snapp.com/snapp-devops/snapp-task-local
  pullPolicy: IfNotPresent
  tag: "caeca55e"

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: false
  className: "nginx"
  hosts:
    - host: snapp-webapp.snapp.com
      paths:
        - path: /
          pathType: Prefix

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

resources:
  requests:
    memory: 128Mi
    cpu: "250m"
  limits:
    memory: 256Mi
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# Liveness and Readiness Probes
# Note: Since http-echo returns 200 for any path, we use root '/'
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

gitlabRunner:
  createServiceAccount: true
  serviceAccountName: gitlab-runner
  namespace: snapp-project

serviceAccount:
  create: true
  name: "gitlab-runner"

networkPolicy:
  enabled: true
  ingressNamespaces: 
    - nginx-gateway
    - snapp-project
